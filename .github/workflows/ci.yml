name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    # Optional: Add a PostgreSQL service if you ever move to integration tests
    # services:
    #   postgres:
    #     image: postgres:17-alpine
    #     env:
    #       POSTGRES_PASSWORD: password
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true # Automatically caches go.mod and build cache

      - name: Verify Dependencies
        run: go mod verify

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run Unit Tests
        run: go test -v -race -coverprofile=coverage.txt ./...

      - name: Build Binary
        run: go build -v -ldflags="-w -s" -o server ./cmd/main.go

      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v3
      #   with:
      #     file: ./coverage.txt
